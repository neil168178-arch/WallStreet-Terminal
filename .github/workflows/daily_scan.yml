name: 🤖 每日量化雷達自動掃描

on:
  schedule:
    # 這裡是 UTC 時間。台灣時間下午 2:00 = UTC 早上 06:00
    # 1-5 代表每週一到週五 (避開週末休市)
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # 🌟 這個神奇指令允許我們隨時在 GitHub 網頁上手動按下「開始測試」按鈕

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 下載最新程式碼
      uses: actions/checkout@v3

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 雲端伺服器的 Python 版本

    - name: 📦 安裝系統依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 啟動 SaaS 級量化機器人
      env:
        # 🌟 從保險箱拿出我們剛剛設定的兩把鑰匙，交給機器人
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: |
        python daily_bot.py
